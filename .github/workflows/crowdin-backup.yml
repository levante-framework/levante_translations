name: Crowdin backup

on:
  workflow_dispatch:
    inputs:
      langs:
        description: 'Language codes (space-separated) or "all" for all languages'
        required: true
        default: 'all'

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install change_check and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r change_utils/requirements.txt
          pip install -e change_utils/

      - name: Run crowdin-backup
        id: backup
        run: |
          crowdin-backup --langs ${{ github.event.inputs.langs }}
        env:
          CROWDIN_TOKEN: ${{ secrets.CROWDIN_TOKEN }}
          CROWDIN_LEVANTE_PID: ${{ secrets.CROWDIN_LEVANTE_PID }}
          GOOGLE_APPLICATION_CREDENTIALS_DEV: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_DEV }}

      - name: Notify Slack
        if: success()
        run: |
          BACKUP_BUCKET="https://console.cloud.google.com/storage/browser/levante-assets-draft/translations/crowdin-backup"
          PAYLOAD=$(cat <<EOF
          {
            "text": "Crowdin backup completed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Crowdin backup created*"
                }
              },
              {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}"},
                  {"type": "mrkdwn", "text": "*Workflow:*\n${{ github.workflow }}"},
                  {"type": "mrkdwn", "text": "*Languages:*\n${{ github.event.inputs.langs }}"},
                  {"type": "mrkdwn", "text": "*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"}
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Backup location:* <${BACKUP_BUCKET}|levante-assets-draft/translations/crowdin-backup>"
                }
              }
            ]
          }
          EOF
          )
          curl -s -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "${{ secrets.SLACK_WEBHOOK_URL }}"
