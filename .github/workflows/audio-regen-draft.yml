name: Regenerate Draft Audio

# Regenerates only updated/missing audio (based on ID3-vs-text diff) from
# draft itembank JSON and uploads resulting MP3s to the draft bucket.
#
# Required repo secrets:
# - GOOGLE_APPLICATION_CREDENTIALS_DEV_JSON
# - ELEVEN_API_KEY (or ELEVENLABS_API_KEY)
# - SLACK_WEBHOOK_URL

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language display name(s) from utilities/config.py; comma-separated allowed (e.g. "Spanish (Argentina),Dutch")'
        required: true
        default: 'Spanish (Argentina)'
      tasks:
        description: 'Task filter: "all" or comma-separated slugs (e.g. memory-game,matrix-reasoning)'
        required: true
        default: 'all'
      model_id:
        description: 'ElevenLabs model id'
        required: true
        default: 'eleven_v3'
      dry_run:
        type: boolean
        description: 'If true, only validate/report; do not generate or upload audio'
        required: true
        default: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests google-cloud-storage pyht elevenlabs mutagen playsound==1.2.2

      - name: Set up GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_DEV_JSON }}' > "$RUNNER_TEMP/gcp-creds.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-creds.json" >> "$GITHUB_ENV"
          echo "GOOGLE_APPLICATION_CREDENTIALS_DEV=$RUNNER_TEMP/gcp-creds.json" >> "$GITHUB_ENV"

      - name: Validate before generation (draft source)
        id: validate_before
        env:
          ELEVEN_API_KEY: ${{ secrets.ELEVEN_API_KEY || secrets.ELEVENLABS_API_KEY || secrets.ELEVEN_LABS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY || secrets.ELEVEN_API_KEY || secrets.ELEVEN_LABS_API_KEY }}
          TRANSLATIONS_DRAFT_BUCKET: levante-assets-draft
          ASSETS_DRAFT_BUCKET: levante-assets-draft
          LANG_INPUT: ${{ github.event.inputs.language }}
          TASKS_INPUT: ${{ github.event.inputs.tasks }}
        run: |
          set -euo pipefail
          rm -f needed_item_bank_translations.csv before_summary.json needed_before_*.csv validate_before_*.log
          python - <<'PY'
          import csv
          import json
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          langs = [x.strip() for x in os.environ.get("LANG_INPUT", "").split(",") if x.strip()]
          if not langs:
              raise SystemExit("No language provided")
          tasks = os.environ.get("TASKS_INPUT", "").strip()
          task_args = ["--tasks", tasks] if tasks and tasks != "all" else []
          out = {}
          failures = []
          total_before = 0

          def safe_name(s: str) -> str:
              n = re.sub(r"[^A-Za-z0-9._-]+", "_", s).strip("_")
              return n or "lang"

          for lang in langs:
              safe = safe_name(lang)
              Path("needed_item_bank_translations.csv").unlink(missing_ok=True)
              cmd = ["python", "generate_speech.py", lang, "--translation-source", "draft", "--validate-only", *task_args]
              proc = subprocess.run(cmd, capture_output=True, text=True)
              Path(f"validate_before_{safe}.log").write_text((proc.stdout or "") + (proc.stderr or ""), encoding="utf-8")

              items = []
              src = Path("needed_item_bank_translations.csv")
              dst = Path(f"needed_before_{safe}.csv")
              if src.exists():
                  src.replace(dst)
                  with dst.open("r", encoding="utf-8-sig", newline="") as f:
                      for row in csv.DictReader(f):
                          item = str(row.get("item_id") or "").strip()
                          if item:
                              items.append(item)
              else:
                  dst.write_text("item_id\n", encoding="utf-8")

              total_before += len(items)
              out[lang] = {
                  "safe": safe,
                  "need_before": len(items),
                  "items_before": items,
                  "returncode": int(proc.returncode),
              }
              if proc.returncode != 0:
                  failures.append(lang)

          Path("before_summary.json").write_text(json.dumps({"languages": out, "total_before": total_before}, ensure_ascii=False, indent=2), encoding="utf-8")

          gh_out = os.environ.get("GITHUB_OUTPUT")
          if gh_out:
              with open(gh_out, "a", encoding="utf-8") as f:
                  f.write(f"need_before={total_before}\n")

          if failures:
              print("Validation failed for:", ", ".join(failures))
              sys.exit(1)
          print(f"Need regeneration before run (all languages): {total_before}")
          PY

      - name: Generate updated/missing audio and upload to draft
        if: steps.validate_before.outputs.need_before != '0' && !inputs.dry_run
        env:
          ELEVEN_API_KEY: ${{ secrets.ELEVEN_API_KEY || secrets.ELEVENLABS_API_KEY || secrets.ELEVEN_LABS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY || secrets.ELEVEN_API_KEY || secrets.ELEVEN_LABS_API_KEY }}
          TRANSLATIONS_DRAFT_BUCKET: levante-assets-draft
          ASSETS_DRAFT_BUCKET: levante-assets-draft
          TASKS_INPUT: ${{ github.event.inputs.tasks }}
          MODEL_ID_INPUT: ${{ github.event.inputs.model_id }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          meta = json.loads(Path("before_summary.json").read_text(encoding="utf-8"))
          tasks = os.environ.get("TASKS_INPUT", "").strip()
          model = os.environ.get("MODEL_ID_INPUT", "").strip() or "eleven_v3"
          task_args = ["--tasks", tasks] if tasks and tasks != "all" else []
          failures = []

          for lang, info in meta.get("languages", {}).items():
              if int(info.get("need_before", 0)) == 0:
                  continue
              safe = info.get("safe") or lang.replace(" ", "_")
              cmd = ["python", "generate_speech.py", lang, "--translation-source", "draft", "--model-id", model, *task_args]
              proc = subprocess.run(cmd, capture_output=True, text=True)
              Path(f"generate_{safe}.log").write_text((proc.stdout or "") + (proc.stderr or ""), encoding="utf-8")
              if proc.returncode != 0:
                  failures.append(lang)

          if failures:
              print("Generation failed for:", ", ".join(failures))
              sys.exit(1)
          print("Generation finished for all requested languages.")
          PY

      - name: Validate after generation (draft source)
        id: validate_after
        if: always()
        env:
          ELEVEN_API_KEY: ${{ secrets.ELEVEN_API_KEY || secrets.ELEVENLABS_API_KEY || secrets.ELEVEN_LABS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY || secrets.ELEVEN_API_KEY || secrets.ELEVEN_LABS_API_KEY }}
          TRANSLATIONS_DRAFT_BUCKET: levante-assets-draft
          ASSETS_DRAFT_BUCKET: levante-assets-draft
          LANG_INPUT: ${{ github.event.inputs.language }}
          TASKS_INPUT: ${{ github.event.inputs.tasks }}
        run: |
          set -euo pipefail
          rm -f needed_item_bank_translations.csv after_summary.json needed_after_*.csv validate_after_*.log
          python - <<'PY'
          import csv
          import json
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          langs = [x.strip() for x in os.environ.get("LANG_INPUT", "").split(",") if x.strip()]
          if not langs:
              raise SystemExit("No language provided")
          tasks = os.environ.get("TASKS_INPUT", "").strip()
          task_args = ["--tasks", tasks] if tasks and tasks != "all" else []
          out = {}
          failures = []
          total_after = 0

          def safe_name(s: str) -> str:
              n = re.sub(r"[^A-Za-z0-9._-]+", "_", s).strip("_")
              return n or "lang"

          for lang in langs:
              safe = safe_name(lang)
              Path("needed_item_bank_translations.csv").unlink(missing_ok=True)
              cmd = ["python", "generate_speech.py", lang, "--translation-source", "draft", "--validate-only", *task_args]
              proc = subprocess.run(cmd, capture_output=True, text=True)
              Path(f"validate_after_{safe}.log").write_text((proc.stdout or "") + (proc.stderr or ""), encoding="utf-8")

              items = []
              src = Path("needed_item_bank_translations.csv")
              dst = Path(f"needed_after_{safe}.csv")
              if src.exists():
                  src.replace(dst)
                  with dst.open("r", encoding="utf-8-sig", newline="") as f:
                      for row in csv.DictReader(f):
                          item = str(row.get("item_id") or "").strip()
                          if item:
                              items.append(item)
              else:
                  dst.write_text("item_id\n", encoding="utf-8")

              total_after += len(items)
              out[lang] = {
                  "safe": safe,
                  "need_after": len(items),
                  "items_after": items,
                  "returncode": int(proc.returncode),
              }
              if proc.returncode != 0:
                  failures.append(lang)

          Path("after_summary.json").write_text(json.dumps({"languages": out, "total_after": total_after}, ensure_ascii=False, indent=2), encoding="utf-8")

          gh_out = os.environ.get("GITHUB_OUTPUT")
          if gh_out:
              with open(gh_out, "a", encoding="utf-8") as f:
                  f.write(f"need_after={total_after}\n")

          if failures:
              print("Post-generation validation failed for:", ", ".join(failures))
              sys.exit(1)
          print(f"Need regeneration after run (all languages): {total_after}")
          PY

      - name: Build run summary
        id: summary
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os

          before_data = {}
          after_data = {}
          if os.path.exists("before_summary.json"):
              before_data = json.load(open("before_summary.json", "r", encoding="utf-8"))
          if os.path.exists("after_summary.json"):
              after_data = json.load(open("after_summary.json", "r", encoding="utf-8"))

          languages = sorted(set((before_data.get("languages") or {}).keys()) | set((after_data.get("languages") or {}).keys()))

          per_lang = {}
          total_before = 0
          total_after = 0
          total_generated = 0
          total_resolved = 0

          for lang in languages:
              b = (before_data.get("languages") or {}).get(lang, {})
              a = (after_data.get("languages") or {}).get(lang, {})
              before_items = set(b.get("items_before") or [])
              after_items = set(a.get("items_after") or [])
              resolved = sorted(before_items - after_items)
              pending = sorted(after_items)
              generated = max(0, len(before_items) - len(after_items))

              per_lang[lang] = {
                  "need_before": len(before_items),
                  "need_after": len(after_items),
                  "generated_count": generated,
                  "resolved_count": len(resolved),
                  "resolved_items": resolved,
                  "pending_items": pending,
                  "resolved_preview": resolved[:25],
                  "pending_preview": pending[:25],
              }
              total_before += len(before_items)
              total_after += len(after_items)
              total_generated += generated
              total_resolved += len(resolved)

          summary = {
              "before_count": total_before,
              "after_count": total_after,
              "generated_count": total_generated,
              "resolved_count": total_resolved,
              "languages": per_lang,
          }
          with open("audio_regen_summary.json", "w", encoding="utf-8") as f:
              json.dump(summary, f, ensure_ascii=False, indent=2)
          print(json.dumps(summary))
          PY

          BEFORE=$(python - <<'PY'
          import json
          print(json.load(open("audio_regen_summary.json", "r", encoding="utf-8"))["before_count"])
          PY
          )
          AFTER=$(python - <<'PY'
          import json
          print(json.load(open("audio_regen_summary.json", "r", encoding="utf-8"))["after_count"])
          PY
          )
          GENERATED=$(python - <<'PY'
          import json
          print(json.load(open("audio_regen_summary.json", "r", encoding="utf-8"))["generated_count"])
          PY
          )
          DRY_RUN='${{ inputs.dry_run }}'
          echo "before=${BEFORE}" >> "$GITHUB_OUTPUT"
          echo "after=${AFTER}" >> "$GITHUB_OUTPUT"
          echo "generated=${GENERATED}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: audio-regeneration-${{ github.run_id }}
          path: |
            validate_before_*.log
            generate_*.log
            validate_after_*.log
            needed_before_*.csv
            needed_after_*.csv
            before_summary.json
            after_summary.json
            audio_regen_summary.json
          if-no-files-found: ignore

      - name: Notify Slack (levante-crowdin)
        if: always() && env.SLACK_WEBHOOK_URL != ''
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.request

          run_url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          language = "${{ github.event.inputs.language }}"
          tasks = "${{ github.event.inputs.tasks }}"
          model = "${{ github.event.inputs.model_id }}"
          dry_run = "${{ inputs.dry_run }}"
          actor = "${{ github.actor }}"
          status = "${{ job.status }}"

          summary = {}
          if os.path.exists("audio_regen_summary.json"):
              with open("audio_regen_summary.json", "r", encoding="utf-8") as f:
                  summary = json.load(f)

          before = int(summary.get("before_count", 0))
          after = int(summary.get("after_count", 0))
          generated = int(summary.get("generated_count", 0))
          languages = summary.get("languages", {}) or {}

          if status == "success":
              title = "*Draft audio regeneration completed*"
              emoji = ":white_check_mark:"
          else:
              title = "*Draft audio regeneration failed*"
              emoji = ":x:"

          per_lang_lines = []
          for lang, stats in languages.items():
              b = int(stats.get("need_before", 0))
              g = int(stats.get("generated_count", 0))
              a = int(stats.get("need_after", 0))
              pending = stats.get("pending_preview", []) or []
              resolved = stats.get("resolved_preview", []) or []
              pending_text = ", ".join(f"`{x}`" for x in pending) if pending else "_None_"
              resolved_text = ", ".join(f"`{x}`" for x in resolved) if resolved else "_None_"
              if len(pending) == 25 and len(stats.get("pending_items", [])) > 25:
                  pending_text += f", … (+{len(stats.get('pending_items', [])) - 25} more)"
              if len(resolved) == 25 and len(stats.get("resolved_items", [])) > 25:
                  resolved_text += f", … (+{len(stats.get('resolved_items', [])) - 25} more)"
              per_lang_lines.append(
                  f"*{lang}* — before: *{b}*, generated: *{g}*, pending: *{a}*\\n"
                  f"• Need generation/regeneration: {pending_text}\\n"
                  f"• Resolved this run: {resolved_text}"
              )

          per_lang_block = "\\n\\n".join(per_lang_lines) if per_lang_lines else "_No language details available_"

          payload = {
              "channel": "#levante-crowdin",
              "text": f"{emoji} Draft audio regeneration: {language}",
              "blocks": [
                  {"type": "section", "text": {"type": "mrkdwn", "text": f"{emoji} {title}"}},
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Triggered by:*\n{actor}"},
                          {"type": "mrkdwn", "text": f"*Status:*\n{status}"},
                          {"type": "mrkdwn", "text": f"*Language:*\n{language}"},
                          {"type": "mrkdwn", "text": f"*Tasks:*\n{tasks}"},
                          {"type": "mrkdwn", "text": f"*Model:*\n{model}"},
                          {"type": "mrkdwn", "text": f"*Dry run:*\n{dry_run}"},
                          {"type": "mrkdwn", "text": f"*Run:*\n<{run_url}|View run>"},
                      ],
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Need regeneration (before):*\n{before}"},
                          {"type": "mrkdwn", "text": f"*Generated this run:*\n{generated}"},
                          {"type": "mrkdwn", "text": f"*Still pending (after):*\n{after}"},
                          {"type": "mrkdwn", "text": "*Bucket:*\n`gs://levante-assets-draft/audio/`"},
                      ],
                  },
                  {"type": "section", "text": {"type": "mrkdwn", "text": f"*Per-language items needing generation/regeneration:*\n\n{per_lang_block}"}},
              ],
          }

          req = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
              _ = resp.read()
          print("Slack notification sent.")
          PY
