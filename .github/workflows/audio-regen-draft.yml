name: Regenerate Draft Audio

# Generates audio for new or changed strings from draft-bucket itembank JSON.
# Checks dev bucket for approved audio, then draft bucket for audio which may be awaiting approval. Where no audio is found with a matching string, regenerates audio and sends to draft bucket to await approval.
#
# Decision logic (per item):
#   1. Placeholder "NO APPROVED TRANSLATION" -> skip (always, no flag overrides).
#   2. --force-regenerate -> regenerate all strings that are not placeholders to draft.
#   3. Config mismatch (voice/model/service/lang changed in any existing clip)?
#      -> fail fast unless --config-change flag is set.
#   4. Approved clip text current?  -> skip.  Draft clip text current? -> skip.
#   5. Otherwise (text changed, or no clip) -> generate to draft.
#
# Required repo secrets:
#   GOOGLE_APPLICATION_CREDENTIALS_DEV_JSON
#   ELEVEN_API_KEY  (or ELEVENLABS_API_KEY)
#   SLACK_WEBHOOK_URL

on:
  workflow_dispatch:
    inputs:
      languages:
        description: >
          BCP-47 locale codes, comma- or space-separated, or "all"
          (e.g. "es-AR,de-DE" or "all"). Uses languageoptions.json from
          the approved bucket; locales absent from that file are rejected.
        required: true
        default: 'all'
      tasks:
        description: >
          "all" for every itembank task folder, or comma-separated names
          (e.g. "general,trog,child-survey"). Valid folders: child-survey,
          general, hearts-and-flowers, hostile-attribution, egma-math,
          matrix-reasoning, memory-game, mental-rotation, same-different-selection,
          theory-of-mind, trog, vocab.
        required: true
        default: 'all'
      dry_run:
        type: boolean
        description: 'If true, plan and report only — no synthesis or upload.'
        required: true
        default: false
      config_change:
        type: boolean
        description: >
          If true, permit regeneration when voice/model/service/lang config
          has changed vs existing audio (text unchanged). Without this flag
          such mismatches cause a hard fail before any generation.
        required: true
        default: false
      force_regenerate:
        type: boolean
        description: >
          If true, regenerate every non-placeholder string unconditionally,
          ignoring existing clips in both buckets.
        required: true
        default: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ASSETS_DRAFT_BUCKET: levante-assets-draft
      ASSETS_DEV_BUCKET: levante-assets-dev
      REPORT_BUCKET: levante-assets-draft

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_itembank_audio.txt

      - name: Set up GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_DEV_JSON }}' > "$RUNNER_TEMP/gcp-creds.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-creds.json" >> "$GITHUB_ENV"

      - name: Generate draft audio
        id: generate
        env:
          ELEVEN_API_KEY: ${{ secrets.ELEVEN_API_KEY || secrets.ELEVENLABS_API_KEY || secrets.ELEVEN_LABS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY || secrets.ELEVEN_API_KEY || secrets.ELEVEN_LABS_API_KEY }}
        run: |
          set -euo pipefail

          FLAGS=""
          [ "${{ inputs.config_change }}"    = "true" ] && FLAGS="$FLAGS --config-change"
          [ "${{ inputs.force_regenerate }}" = "true" ] && FLAGS="$FLAGS --force-regenerate"
          [ "${{ inputs.dry_run }}"          = "true" ] && FLAGS="$FLAGS --dry-run"

          python generate_itembank_audio.py \
            --languages ${{ github.event.inputs.languages }} \
            --tasks    ${{ github.event.inputs.tasks }} \
            $FLAGS

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: audio-regeneration-${{ github.run_id }}
          path: |
            audio_regen_summary.json
            report_links.json
          if-no-files-found: ignore

      - name: Upload report files to GCS
        if: always()
        env:
          REPORT_PREFIX: reports/audio-regen/${{ github.run_id }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import glob
          import json
          import os
          from pathlib import Path
          from google.cloud import storage

          bucket_name = os.environ.get("REPORT_BUCKET", "levante-assets-draft").strip()
          prefix = os.environ.get("REPORT_PREFIX", "").strip().strip("/")

          files = [f for f in sorted(set(glob.glob("audio_regen_summary.json"))) if Path(f).is_file()]
          uploaded = []

          if files:
              client = storage.Client()
              bucket = client.bucket(bucket_name)
              for local in files:
                  name = os.path.basename(local)
                  obj = f"{prefix}/{name}" if prefix else name
                  bucket.blob(obj).upload_from_filename(local)
                  uploaded.append({
                      "file": name,
                      "gs_uri": f"gs://{bucket_name}/{obj}",
                      "console_url": (
                          f"https://console.cloud.google.com/storage/browser/_details/"
                          f"{bucket_name}/{obj}"
                      ),
                  })

          Path("report_links.json").write_text(
              json.dumps(
                  {
                      "bucket": bucket_name,
                      "prefix": prefix,
                      "uploaded": uploaded,
                      "console_prefix_url": (
                          f"https://console.cloud.google.com/storage/browser/{bucket_name}/{prefix}"
                          if prefix
                          else f"https://console.cloud.google.com/storage/browser/{bucket_name}"
                      ),
                  },
                  ensure_ascii=False,
                  indent=2,
              ),
              encoding="utf-8",
          )
          print(f"Uploaded {len(uploaded)} report file(s).")
          PY

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          run_url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          languages_input = "${{ github.event.inputs.languages }}"
          tasks_input     = "${{ github.event.inputs.tasks }}"
          dry_run         = "${{ inputs.dry_run }}"
          config_change   = "${{ inputs.config_change }}"
          force_regen     = "${{ inputs.force_regenerate }}"
          actor           = "${{ github.actor }}"
          job_status      = "${{ job.status }}"

          summary = {}
          if os.path.exists("audio_regen_summary.json"):
              with open("audio_regen_summary.json", "r", encoding="utf-8") as f:
                  summary = json.load(f)

          generated       = int(summary.get("generated", 0))
          blocked         = int(summary.get("blocked", 0))
          skipped_dev     = int(summary.get("skipped_dev", 0))
          skipped_draft   = int(summary.get("skipped_draft", 0))
          errors_count    = int(summary.get("errors", 0))
          placeholders    = int(summary.get("placeholders", 0))
          missing_json    = int(summary.get("missing_translation_blob", 0))
          languages       = summary.get("languages", {}) or {}

          report_links = {}
          if os.path.exists("report_links.json"):
              with open("report_links.json", "r", encoding="utf-8") as f:
                  report_links = json.load(f)

          # Determine overall status
          is_blocked = blocked > 0 and config_change != "true"
          if job_status == "success" and not is_blocked:
              emoji = ":white_check_mark:"
              title = "*Draft audio regeneration completed*"
          elif is_blocked or job_status == "failure":
              emoji = ":x:"
              title = "*Draft audio regeneration FAILED*"
          else:
              emoji = ":warning:"
              title = "*Draft audio regeneration completed with warnings*"

          # Per-language detail block
          per_lang_lines = []
          ordered = sorted(
              languages.items(),
              key=lambda kv: (
                  int((kv[1] or {}).get("generated", 0)) == 0,
                  -int((kv[1] or {}).get("generated", 0)),
                  kv[0],
              ),
          )
          for idx, (lang, stats) in enumerate(ordered):
              if idx >= 8:
                  per_lang_lines.append(f"_… (+{len(ordered) - 8} more languages)_")
                  break
              gen    = int(stats.get("generated", 0))
              blk    = int(stats.get("blocked_count", 0))
              sk_dev = int(stats.get("skipped_dev", 0))
              sk_drf = int(stats.get("skipped_draft", 0))
              errs   = int(stats.get("error_count", 0))

              gen_items = stats.get("generated_items_preview", []) or []
              blk_items = stats.get("blocked_items", []) or []
              gen_text  = ", ".join(f"`{x}`" for x in gen_items[:6]) if gen_items else "_None_"
              blk_text  = ", ".join(f"`{x}`" for x in blk_items[:6]) if blk_items else "_None_"
              if len(gen_items) > 6:
                  gen_text += f", … (+{len(gen_items) - 6} more)"
              if len(blk_items) > 6:
                  blk_text += f", … (+{len(blk_items) - 6} more)"

              line = (
                  f"*{lang}* — generated: *{gen}*, "
                  f"skipped dev: {sk_dev}, skipped draft: {sk_drf}, "
                  f"blocked: {blk}, errors: {errs}\n"
                  f"• Generated: {gen_text}"
              )
              if blk > 0:
                  line += f"\n• Blocked (need --config-change): {blk_text}"
              per_lang_lines.append(line)

          per_lang_block = "\n\n".join(per_lang_lines) if per_lang_lines else "_No language details_"
          if len(per_lang_block) > 2600:
              per_lang_block = per_lang_block[:2600] + "\n…_(truncated; see report files)_"

          # Config-mismatch warning block
          blocked_warning = ""
          if is_blocked:
              blocked_warning = (
                  f":rotating_light: *{blocked} item(s) blocked by config mismatch.*\n"
                  "Existing audio text matches current JSON but voice/model/service/lang has changed.\n"
                  "Re-run the workflow with *config_change = true* to permit regeneration."
              )

          # Report links
          uploaded_reports = report_links.get("uploaded", []) if isinstance(report_links, dict) else []
          if uploaded_reports:
              report_lines = [
                  f"• <{r.get('console_url')}|{r.get('file')}>"
                  for r in uploaded_reports[:10]
              ]
              if len(uploaded_reports) > 10:
                  report_lines.append(f"• … (+{len(uploaded_reports) - 10} more)")
              reports_block = "\n".join(report_lines)
              reports_header = (
                  f"*Report files:* <{report_links.get('console_prefix_url')}|open folder> "
                  f"(`gs://{report_links.get('bucket')}/{report_links.get('prefix')}`)"
              )
          else:
              reports_header = "*Report files:* _No files uploaded_"
              reports_block = "_None_"

          blocks = [
              {"type": "section", "text": {"type": "mrkdwn", "text": f"{emoji} {title}"}},
              {
                  "type": "section",
                  "fields": [
                      {"type": "mrkdwn", "text": f"*Triggered by:*\n{actor}"},
                      {"type": "mrkdwn", "text": f"*Status:*\n{job_status}"},
                      {"type": "mrkdwn", "text": f"*Languages:*\n{languages_input}"},
                      {"type": "mrkdwn", "text": f"*Tasks:*\n{tasks_input}"},
                      {"type": "mrkdwn", "text": f"*Dry run:*\n{dry_run}"},
                      {"type": "mrkdwn", "text": f"*Config change:*\n{config_change}"},
                      {"type": "mrkdwn", "text": f"*Force regen:*\n{force_regen}"},
                      {"type": "mrkdwn", "text": f"*Run:*\n<{run_url}|View run>"},
                  ],
              },
              {
                  "type": "section",
                  "fields": [
                      {"type": "mrkdwn", "text": f"*Generated to draft:*\n{generated}"},
                      {"type": "mrkdwn", "text": f"*Skipped (approved):*\n{skipped_dev}"},
                      {"type": "mrkdwn", "text": f"*Skipped (pending):*\n{skipped_draft}"},
                      {"type": "mrkdwn", "text": f"*Blocked (config):*\n{blocked}"},
                      {"type": "mrkdwn", "text": f"*Errors:*\n{errors_count}"},
                      {"type": "mrkdwn", "text": f"*Placeholders skipped:*\n{placeholders}"},
                      {"type": "mrkdwn", "text": f"*Missing JSON blobs:*\n{missing_json}"},
                      {"type": "mrkdwn", "text": f"*Output bucket:*\n`gs://levante-assets-draft/audio/`"},
                  ],
              },
              {
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": f"*Per-language detail:*\n\n{per_lang_block}"},
              },
          ]

          if blocked_warning:
              blocks.append({
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": blocked_warning},
              })

          blocks.append({
              "type": "section",
              "text": {"type": "mrkdwn", "text": f"{reports_header}\n{reports_block}"},
          })

          payload = {
              "text": f"{emoji} Draft audio regeneration: {languages_input}",
              "blocks": blocks,
          }

          req = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  _ = resp.read()
              print("Slack notification sent.")
          except urllib.error.HTTPError as e:
              body = ""
              try:
                  body = e.read().decode("utf-8", errors="ignore")
              except Exception:
                  pass
              print(f"Warning: Slack webhook rejected payload (HTTP {e.code}): {body[:500]}")
              print("Continuing without failing workflow.")
          except Exception as e:
              print(f"Warning: Slack notification failed: {e}")
              print("Continuing without failing workflow.")
          PY
